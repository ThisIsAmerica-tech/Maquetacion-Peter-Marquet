<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - Petermarket</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>

    <header class="main-header">
        <div class="header-container" style="justify-content: center;">
            <div class="logo">
                <a href="../index.html" style="text-decoration: none; color: inherit;">
                    <h1><span>Peter</span>market</h1>
                </a>
            </div>
        </div>
    </header>

    <main>
        <section class="login-section">
            <div class="login-card">
                <h2>Crea tu cuenta</h2>
                <p>Únete a Petermarket y disfruta de nuestras ofertas</p>
                
                <!-- AQUÍ AGREGUÉ EL ID: id="form-registro" -->
                <form id="form-registro" action="#" method="POST">
                    <div class="input-group">
                        <label for="nombre">Nombre Completo</label>
                        <div class="input-wrapper">
                            <i class="fa-regular fa-user"></i>
                            <input type="text" id="nombre" name="nombre" placeholder="Ej. Juan Pérez" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="email">Correo Electrónico</label>
                        <div class="input-wrapper">
                            <i class="fa-regular fa-envelope"></i>
                            <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="password">Contraseña</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="password" name="password" placeholder="Crea una contraseña" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="confirm-password">Confirmar Contraseña</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="confirm-password" name="confirm-password" placeholder="Repite tu contraseña" required>
                        </div>
                    </div>

                    <div class="login-options" style="justify-content: flex-start; margin-bottom: 20px;">
                        <label>
                            <input type="checkbox" name="terminos" required> 
                            Acepto los <a href="terminos.html" style="margin-left: 5px;">Términos y Condiciones</a>
                        </label>
                    </div>

                    <button type="submit" class="btn-submit">
                        Registrarse <i class="fa-solid fa-user-plus" style="margin-left: 8px;"></i>
                    </button>
                </form>

                <div class="register-link">
                    ¿Ya tienes una cuenta? <a href="login.html">Ingresa aquí</a>
                </div>
            </div>
        </section>
    </main>

    <footer class="main-footer" style="text-align: center; padding: 20px; background-color: #333; color: white;">
        <div class="footer-bottom">
            <p>&copy; 2025 Petermarket. Todos los derechos reservados.</p>
        </div>
    </footer>

    <!-- AQUÍ ESTÁ EL SCRIPT QUE HACE LA MAGIA DE LA REDIRECCIÓN -->
    <script>
    document.getElementById('form-registro').addEventListener('submit', function(event) {
        event.preventDefault(); 
        
        // 1. Capturamos el nombre que el usuario escribió en el input
        let nombreCompleto = document.getElementById('nombre').value;
        
        // 2. Lo guardamos en la memoria del navegador
        localStorage.setItem('usuarioPetermarket', nombreCompleto);
        
        alert("¡Cuenta creada para " + nombreCompleto + "! Ahora inicia sesión.");
        
        // Redirigimos al login
        window.location.href = "login.html"; 
    });
    </script>
</body>
</html>
