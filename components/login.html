<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar - Petermarket</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>

    <header class="main-header">
        <div class="header-container" style="justify-content: center;">
            <div class="logo">
                <a href="../index.html" style="text-decoration: none; color: inherit;">
                    <h1><span>Peter</span>market</h1>
                </a>
            </div>
        </div>
    </header>

    <main>
        <section class="login-section">
            <div class="login-card">
                <h2>Bienvenido de nuevo</h2>
                <p>Ingresa tus datos para acceder a tu cuenta</p>
                
                <form id="form-login" action="#" method="POST">
                    <div class="input-group">
                        <label for="email">Correo Electrónico</label>
                        <div class="input-wrapper">
                            <i class="fa-regular fa-envelope"></i>
                            <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="password">Contraseña</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="password" name="password" placeholder="Tu contraseña" required>
                        </div>
                    </div>

                    <div class="login-options">
                        <label>
                            <input type="checkbox" name="remember"> Recordarme
                        </label>
                        <a href="#recuperar">¿Olvidaste tu contraseña?</a>
                    </div>

                    <button type="submit" class="btn-submit">
                        Ingresar <i class="fa-solid fa-arrow-right-to-bracket" style="margin-left: 8px;"></i>
                    </button>
                </form>

                <div class="register-link">
                    ¿No tienes una cuenta? <a href="registro.html">Regístrate aquí</a>
                </div>
            </div>
        </section>
    </main>

    <footer class="main-footer" style="text-align: center; padding: 20px; background-color: #333; color: white;">
        <div class="footer-bottom">
            <p>&copy; 2026 Petermarket. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script>
        document.getElementById('form-login').addEventListener('submit', function(event) {
            event.preventDefault(); 
            
            // 1. Obtenemos el correo que escribió el usuario
            let email = document.getElementById('email').value;
            
            // 2. Cortamos el correo en el "@" y nos quedamos con la primera parte (ej. "juan" de juan@correo.com)
            let nombreUsuario = email.split('@')[0];
            
            // 3. Ponemos la primera letra en mayúscula para que se vea bonito (Juan)
            nombreUsuario = nombreUsuario.charAt(0).toUpperCase() + nombreUsuario.slice(1);
            
            // 4. Guardamos ese nombre en la memoria del navegador
            localStorage.setItem('usuarioPetermarket', nombreUsuario);
            
            alert("¡Inicio de sesión exitoso! Bienvenido " + nombreUsuario);
            window.location.href = "../index.html"; 
        });
    </script>
</body>
</html>
